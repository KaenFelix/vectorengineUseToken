name: build

on:
  push:
    branches: [main]
    tags: ['v*']         # push tag (如 v1.0.0) 也会触发,跑完后会自动发布 Release
  workflow_dispatch:     # 允许在网页上手动触发
    inputs:
      release:
        description: 'Create a GitHub Release (only effective for non-tag pushes)'
        type: boolean
        default: false

permissions:
  contents: write  # release job 需要写权限

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin        # macOS Intel
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin       # macOS Apple Silicon
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc    # Windows
            ext: ".exe"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        working-directory: proxy-rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary exists
        working-directory: proxy-rust
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/vectorengine-proxy${{ matrix.ext }}"
          if [ ! -f "$bin" ]; then
            echo "::error::Binary not found at $bin"
            echo "Contents of target/${{ matrix.target }}/release/:"
            ls -la "target/${{ matrix.target }}/release/" 2>&1 || true
            exit 1
          fi
          echo "OK: $(file "$bin")"
          echo "Size: $(du -h "$bin" | cut -f1)"

      - uses: actions/upload-artifact@v4
        with:
          name: vectorengine-proxy-${{ matrix.target }}
          path: proxy-rust/target/${{ matrix.target }}/release/vectorengine-proxy${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    # 触发条件:
    #   - push tag v*  → 自动发布
    #   - workflow_dispatch 勾选了 release → 也发布
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.release == 'true')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Show what we collected
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/vectorengine-proxy*
          generate_release_notes: true
          fail_on_unmatched_files: false
          # tag 触发:用 tag 名;dispatch 触发:用时间戳
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('manual-{0}', github.run_id) }}
          name: ${{ github.event_name == 'push' && github.ref_name || format('Manual Build {0}', github.run_id) }}
          draft: false
          prerelease: ${{ github.event_name == 'push' && contains(github.ref_name, '-') || false }}