name: build

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许在网页上手动触发

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin        # macOS Intel
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin       # macOS Apple Silicon
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc    # Windows
            ext: ".exe"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build release
        working-directory: proxy-rust
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify binary exists
        working-directory: proxy-rust
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/vectorengine-proxy${{ matrix.ext }}"
          if [ ! -f "$bin" ]; then
            echo "::error::Binary not found at $bin"
            echo "Contents of target/${{ matrix.target }}/release/:"
            ls -la "target/${{ matrix.target }}/release/" 2>&1 || true
            exit 1
          fi
          echo "OK: $(file "$bin")"
          echo "Size: $(du -h "$bin" | cut -f1)"

      - uses: actions/upload-artifact@v4
        with:
          name: vectorengine-proxy-${{ matrix.target }}
          path: proxy-rust/target/${{ matrix.target }}/release/vectorengine-proxy${{ matrix.ext }}
          if-no-files-found: error